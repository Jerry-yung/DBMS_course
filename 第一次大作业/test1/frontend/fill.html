<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>填写问卷</title>
  <link rel="stylesheet" href="/common.css" />
</head>
<body>
  <header><strong>填写问卷</strong></header>
  <main>
    <div id="intro" class="card" style="display:none"></div>
    <div id="panel" class="card" style="display:none">
      <h1 id="qtitle"></h1>
      <div id="qbody"></div>
      <div class="row" style="margin-top:1rem">
        <button id="nextBtn">提交本题</button>
        <button id="submitBtn" class="secondary" type="button">提交整卷</button>
      </div>
    </div>
    <div id="done" class="card" style="display:none">
      <h1>完成</h1>
      <p id="thanks"></p>
      <div id="doneActions" class="row" style="display:none;margin-top:1rem">
        <button type="button" id="doneSubmitBtn">提交整卷</button>
      </div>
    </div>
    <div id="msg" class="err"></div>
  </main>
  <script src="/api.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const code = params.get("code");
    if (!code) {
      document.getElementById("msg").textContent = "缺少 ?code=问卷短码";
    }
    const sessionKey = "fill_session_" + code;
    function sessionId() {
      let s = localStorage.getItem(sessionKey);
      if (!s) {
        s = crypto.randomUUID();
        localStorage.setItem(sessionKey, s);
      }
      return s;
    }
    let currentQ = null;
    function showDoneNeedSubmit(message) {
      document.getElementById("panel").style.display = "none";
      document.getElementById("done").style.display = "block";
      document.getElementById("thanks").textContent = message;
      document.getElementById("doneActions").style.display = "flex";
    }
    async function loadIntro() {
      const res = await fetch("/api/v1/public/surveys/" + encodeURIComponent(code));
      const body = await res.json();
      if (!res.ok) throw new Error(body.detail?.message || "加载失败");
      const d = body.data;
      document.getElementById("intro").style.display = "block";
      document.getElementById("intro").innerHTML =
        "<h1>" +
        escapeHtml(d.title) +
        "</h1><p>" +
        escapeHtml(d.description || "") +
        "</p><button id='start'>开始填写</button>";
      document.getElementById("start").onclick = () => {
        document.getElementById("intro").style.display = "none";
        document.getElementById("panel").style.display = "block";
        refreshNext();
      };
    }
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }
    async function refreshNext() {
      const sid = sessionId();
      const res = await fetch(
        "/api/v1/public/surveys/" +
          encodeURIComponent(code) +
          "/next?session_id=" +
          encodeURIComponent(sid),
        { headers: authHeaders() }
      );
      const body = await res.json();
      if (!res.ok) throw new Error(body.detail?.message || "加载题目失败");
      const d = body.data;
      if (d.is_done || !d.next_question) {
        showDoneNeedSubmit(
          "您已答完所有题目，请点击下方「提交整卷」结束填写。"
        );
        return;
      }
      currentQ = d.next_question;
      document.getElementById("qtitle").textContent = currentQ.title;
      const box = document.getElementById("qbody");
      box.innerHTML = "";
      if (currentQ.type === "single_choice") {
        for (const o of currentQ.options || []) {
          const id = "opt_" + o.value;
          box.innerHTML += `<label><input type="radio" name="cv" value="${escapeHtml(
            o.value
          )}" /> ${escapeHtml(o.label)}</label><br/>`;
        }
      } else if (currentQ.type === "multiple_choice") {
        for (const o of currentQ.options || []) {
          box.innerHTML += `<label><input type="checkbox" name="mv" value="${escapeHtml(
            o.value
          )}" /> ${escapeHtml(o.label)}</label><br/>`;
        }
      } else if (currentQ.type === "number") {
        box.innerHTML = '<input type="number" id="nv" />';
      } else {
        box.innerHTML = '<textarea id="tv" rows="4"></textarea>';
      }
    }
    function readAnswer() {
      if (!currentQ) return null;
      if (currentQ.type === "single_choice") {
        const el = document.querySelector("input[name=cv]:checked");
        return el ? el.value : null;
      }
      if (currentQ.type === "multiple_choice") {
        return Array.from(document.querySelectorAll("input[name=mv]:checked")).map(
          (e) => e.value
        );
      }
      if (currentQ.type === "number") {
        const v = document.getElementById("nv").value;
        return v === "" ? null : Number(v);
      }
      const t = document.getElementById("tv");
      return t ? t.value : null;
    }
    document.getElementById("nextBtn").onclick = async () => {
      document.getElementById("msg").textContent = "";
      try {
        const value = readAnswer();
        const res = await fetch(
          "/api/v1/public/surveys/" + encodeURIComponent(code) + "/answer",
          {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify({
              session_id: sessionId(),
              question_id: currentQ.id,
              value,
            }),
          }
        );
        const body = await res.json();
        if (!res.ok) throw new Error(body.detail?.message || "提交失败");
        const d = body.data;
        if (d.is_done || !d.next_question) {
          showDoneNeedSubmit(
            "本题已保存。您已答完所有题目，请点击下方「提交整卷」结束填写。"
          );
        } else {
          currentQ = d.next_question;
          document.getElementById("qtitle").textContent = currentQ.title;
          const box = document.getElementById("qbody");
          box.innerHTML = "";
          if (currentQ.type === "single_choice") {
            for (const o of currentQ.options || []) {
              box.innerHTML += `<label><input type="radio" name="cv" value="${escapeHtml(
                o.value
              )}" /> ${escapeHtml(o.label)}</label><br/>`;
            }
          } else if (currentQ.type === "multiple_choice") {
            for (const o of currentQ.options || []) {
              box.innerHTML += `<label><input type="checkbox" name="mv" value="${escapeHtml(
                o.value
              )}" /> ${escapeHtml(o.label)}</label><br/>`;
            }
          } else if (currentQ.type === "number") {
            box.innerHTML = '<input type="number" id="nv" />';
          } else {
            box.innerHTML = '<textarea id="tv" rows="4"></textarea>';
          }
        }
      } catch (e) {
        document.getElementById("msg").textContent = e.message;
      }
    };
    async function submitWholeSurvey() {
      document.getElementById("msg").textContent = "";
      try {
        const res = await fetch(
          "/api/v1/public/surveys/" + encodeURIComponent(code) + "/submit",
          {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify({ session_id: sessionId() }),
          }
        );
        const body = await res.json();
        if (!res.ok) throw new Error(body.detail?.message || "提交失败");
        document.getElementById("panel").style.display = "none";
        document.getElementById("done").style.display = "block";
        document.getElementById("doneActions").style.display = "none";
        document.getElementById("thanks").textContent =
          (body.data && body.data.thank_you_message) || "感谢您的参与！";
      } catch (e) {
        document.getElementById("msg").textContent = e.message;
      }
    }
    document.getElementById("submitBtn").onclick = submitWholeSurvey;
    document.getElementById("doneSubmitBtn").onclick = submitWholeSurvey;
    if (code) {
      loadIntro().catch((e) => {
        document.getElementById("msg").textContent = e.message;
      });
    }
  </script>
</body>
</html>
