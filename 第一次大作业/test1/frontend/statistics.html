<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>统计</title>
  <link rel="stylesheet" href="/common.css" />
</head>
<body>
  <header>
    <strong>问卷统计</strong>
    <span><a href="/index.html">返回</a></span>
  </header>
  <main>
    <div class="card row">
      <button id="load">刷新数据</button>
      <a class="btn secondary" id="dlj" href="#">导出 JSON</a>
      <a class="btn secondary" id="dlc" href="#">导出 CSV</a>
    </div>
    <div class="card">
      <pre id="out" style="white-space:pre-wrap;font-size:0.85rem"></pre>
    </div>
    <div id="msg" class="err"></div>
  </main>
  <script src="/api.js"></script>
  <script>
    requireLogin();
    const params = new URLSearchParams(location.search);
    const sid = params.get("id");
    if (!sid) {
      document.getElementById("msg").textContent = "缺少 ?id=";
    }
    if (sid) {
      document.getElementById("dlj").href =
        "/api/v1/surveys/" + encodeURIComponent(sid) + "/export?format=json";
      document.getElementById("dlc").href =
        "/api/v1/surveys/" + encodeURIComponent(sid) + "/export?format=csv";
    }
    document.getElementById("load").onclick = async () => {
      document.getElementById("msg").textContent = "";
      try {
        const res = await apiJson(
          "/surveys/" + encodeURIComponent(sid) + "/statistics"
        );
        document.getElementById("out").textContent = JSON.stringify(
          res.data,
          null,
          2
        );
      } catch (e) {
        document.getElementById("msg").textContent = e.message;
      }
    };
    ["dlj", "dlc"].forEach((id) => {
      document.getElementById(id).addEventListener("click", (ev) => {
        ev.preventDefault();
        const url = document.getElementById(id).getAttribute("href");
        fetch(url, { headers: { Authorization: "Bearer " + getToken() } })
          .then((r) => r.blob())
          .then((b) => {
            const a = document.createElement("a");
            a.href = URL.createObjectURL(b);
            a.download = id === "dlj" ? "export.json" : "export.csv";
            a.click();
          })
          .catch((e) => alert(e.message));
      });
    });
    if (sid) {
      document.getElementById("load").click();
    }
  </script>
</body>
</html>
