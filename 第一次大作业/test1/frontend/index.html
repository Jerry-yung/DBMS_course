<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我的问卷</title>
  <link rel="stylesheet" href="/common.css" />
  <style>
    .survey-status { font-weight: 500; }
    .survey-status-draft { color: var(--muted); }
    .survey-status-published { color: var(--ok); }
    .survey-status-closed { color: var(--danger); }
    .survey-status-unknown { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <strong>我的问卷</strong>
    <span class="row">
      <a href="/login.html">登录</a>
      <button class="secondary" id="logout" type="button">退出</button>
    </span>
  </header>
  <main>
    <div class="card row" style="justify-content:space-between">
      <h1 style="margin:0">列表</h1>
      <button id="create">新建问卷</button>
    </div>
    <div id="list" class="card"></div>
    <div id="msg" class="err"></div>
  </main>
  <script src="/api.js"></script>
  <script>
    requireLogin();
    document.getElementById("logout").onclick = () => {
      localStorage.removeItem("token");
      window.location.href = "/login.html";
    };
    async function load() {
      const box = document.getElementById("list");
      box.innerHTML = "加载中…";
      try {
        const res = await apiJson("/surveys");
        const rows = res.data || [];
        if (!rows.length) {
          box.innerHTML = "<p>暂无问卷，点击「新建问卷」开始。</p>";
          return;
        }
        let html =
          "<table><thead><tr><th>标题</th><th>状态</th><th>操作</th></tr></thead><tbody>";
        for (const s of rows) {
          const fillUrl = `${location.origin}/fill.html?code=${encodeURIComponent(s.short_code)}`;
          html += `<tr>
            <td>${escapeHtml(s.title)}</td>
            <td>${statusLabelHtml(s.status)}</td>
            <td class="row">
              <a class="btn secondary" href="/edit.html?id=${encodeURIComponent(s.id)}">编辑</a>
              <a class="btn secondary" href="/statistics.html?id=${encodeURIComponent(s.id)}">统计</a>
              <button type="button" class="btn" data-copy-link="${escapeHtml(fillUrl)}">复制问卷链接</button>
              <button type="button" data-pub="${s.id}">发布</button>
              <button type="button" data-close="${s.id}" class="secondary">关闭问卷</button>
              <button type="button" data-del="${s.id}" class="danger">删除问卷</button>
            </td>
          </tr>`;
        }
        html += "</tbody></table>";
        box.innerHTML = html;
        box.querySelectorAll("[data-pub]").forEach((btn) => {
          btn.onclick = () => publish(btn.getAttribute("data-pub"));
        });
        box.querySelectorAll("[data-close]").forEach((btn) => {
          btn.onclick = () => closeSurvey(btn.getAttribute("data-close"));
        });
        box.querySelectorAll("[data-copy-link]").forEach((btn) => {
          btn.onclick = () => copySurveyLink(btn.getAttribute("data-copy-link"));
        });
        box.querySelectorAll("[data-del]").forEach((btn) => {
          btn.onclick = () => deleteSurvey(btn.getAttribute("data-del"));
        });
      } catch (e) {
        box.innerHTML = "";
        document.getElementById("msg").textContent = e.message;
      }
    }
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
    function statusLabelHtml(st) {
      const map = {
        draft: ["未发布", "survey-status-draft"],
        published: ["已发布", "survey-status-published"],
        closed: ["已关闭", "survey-status-closed"],
      };
      const pair = map[st] || [st, "survey-status-unknown"];
      return `<span class="survey-status ${pair[1]}">${escapeHtml(pair[0])}</span>`;
    }
    async function publish(id) {
      try {
        await apiJson("/surveys/" + id + "/publish", { method: "POST" });
        await load();
      } catch (e) {
        alert(e.message);
      }
    }
    async function closeSurvey(id) {
      try {
        await apiJson("/surveys/" + id + "/close", { method: "POST" });
        await load();
      } catch (e) {
        alert(e.message);
      }
    }
    async function copySurveyLink(url) {
      if (!url) return;
      try {
        await navigator.clipboard.writeText(url);
        const el = document.getElementById("msg");
        el.className = "ok";
        el.textContent = "已复制";
        clearTimeout(copySurveyLink._t);
        copySurveyLink._t = setTimeout(() => {
          el.textContent = "";
          el.className = "err";
        }, 2200);
      } catch (e) {
        alert("复制失败，请手动复制：\n" + url);
      }
    }
    async function deleteSurvey(id) {
      if (
        !confirm(
          "确定删除该问卷？题目、跳转规则与所有答卷将永久删除，不可恢复。"
        )
      )
        return;
      try {
        await apiJson("/surveys/" + encodeURIComponent(id), {
          method: "DELETE",
        });
        const el = document.getElementById("msg");
        el.className = "ok";
        el.textContent = "已删除";
        await load();
      } catch (e) {
        alert(e.message);
      }
    }
    document.getElementById("create").onclick = async () => {
      try {
        const res = await apiJson("/surveys", {
          method: "POST",
          body: JSON.stringify({ title: "未命名问卷", description: "" }),
        });
        window.location.href = "/edit.html?id=" + encodeURIComponent(res.data.id);
      } catch (e) {
        alert(e.message);
      }
    };
    load();
  </script>
</body>
</html>
