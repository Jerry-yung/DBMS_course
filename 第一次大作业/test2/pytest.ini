[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = .

# 输出：逐条用例名、短错误回溯、结尾摘要（跳过/失败等）；不刷屏告警
# langsmith 会向 pytest 注册插件；与项目依赖的旧版 pydantic 冲突时会直接崩在收集阶段，故禁用
addopts =
    -v
    --tb=short
    --disable-warnings
    -ra
    -p no:langsmith_plugin

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
