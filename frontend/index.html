<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我的问卷</title>
  <link rel="stylesheet" href="/common.css" />
  <style>
    .survey-status { font-weight: 500; }
    .survey-status-draft { color: var(--muted); }
    .survey-status-published { color: var(--ok); }
    .survey-status-closed { color: var(--danger); }
    .survey-status-unknown { color: var(--muted); }
    .survey-gate-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(15, 23, 42, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .survey-gate-overlay.open {
      display: flex;
    }
    .survey-gate-box {
      position: relative;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      max-width: 440px;
      width: 100%;
      padding: 1.25rem 1.35rem 1.1rem;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
    }
    .survey-gate-x {
      position: absolute;
      top: 0.5rem;
      right: 0.55rem;
      border: none;
      background: transparent;
      color: #94a3b8;
      font-size: 1.35rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.2rem 0.45rem;
    }
    .survey-gate-x:hover {
      color: #e2e8f0;
    }
    .survey-gate-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1.2rem;
      flex-wrap: wrap;
    }
    .survey-gate-btn-dup {
      background: #14532d;
      color: #bbf7d0;
      border: 1px solid #166534;
      padding: 0.5rem 1.1rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .survey-gate-btn-dup:hover {
      background: #166534;
      color: #fff;
    }
    .survey-gate-btn-prev {
      background: transparent;
      color: #e2e8f0;
      border: 1px solid #475569;
      padding: 0.5rem 1.1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .survey-gate-btn-prev:hover {
      border-color: #64748b;
      background: rgba(51, 65, 85, 0.35);
    }
  </style>
</head>
<body>
  <header>
    <strong>我的问卷</strong>
    <span class="row">
      <a href="/login.html">登录</a>
      <button class="secondary" id="logout" type="button">退出</button>
    </span>
  </header>
  <main>
    <div class="card row" style="justify-content:space-between">
      <h1 style="margin:0">列表</h1>
      <span class="row" style="gap:0.5rem">
        <a class="btn secondary" href="/library.html">题库管理</a>
        <button id="create">新建问卷</button>
      </span>
    </div>
    <div id="list" class="card"></div>
    <div id="msg" class="err"></div>
  </main>

  <div
    id="surveyEditGateModal"
    class="survey-gate-overlay"
    aria-hidden="true"
    role="dialog"
    aria-labelledby="surveyGateHeading"
  >
    <div class="survey-gate-box">
      <button type="button" class="survey-gate-x" id="surveyGateDismiss" aria-label="关闭">
        &times;
      </button>
      <h2 id="surveyGateHeading" style="margin:0 0 0.65rem;font-size:1.05rem;color:#f1f5f9">
        无法直接编辑
      </h2>
      <p id="surveyGateMessage" style="margin:0;line-height:1.55;color:#cbd5e1;font-size:0.9rem"></p>
      <div class="survey-gate-actions">
        <button type="button" id="surveyGateDuplicate" class="survey-gate-btn-dup">复制</button>
        <button type="button" id="surveyGatePreview" class="survey-gate-btn-prev">预览</button>
      </div>
    </div>
  </div>
  <script src="/api.js"></script>
  <script>
    requireLogin();
    document.getElementById("logout").onclick = () => {
      if (!confirm("确定要退出登录吗？")) return;
      localStorage.removeItem("token");
      window.location.href = "/login.html";
    };
    async function load() {
      const box = document.getElementById("list");
      box.innerHTML = "加载中…";
      try {
        const res = await apiJson("/surveys");
        const rows = res.data || [];
        if (!rows.length) {
          box.innerHTML = "<p>暂无问卷，点击「新建问卷」开始。</p>";
          return;
        }
        let html =
          "<table><thead><tr><th>标题</th><th>状态</th><th>操作</th></tr></thead><tbody>";
        for (const s of rows) {
          const fillUrl = `${location.origin}/fill.html?code=${encodeURIComponent(s.short_code)}`;
          const locked =
            s.status === "published" || s.status === "closed";
          const editCtrl = locked
            ? `<button type="button" class="btn secondary" data-gate-edit="${escapeHtml(s.id)}">编辑</button>`
            : `<a class="btn secondary" href="/edit.html?id=${encodeURIComponent(s.id)}">编辑</a>`;
          html += `<tr>
            <td>${escapeHtml(s.title)}</td>
            <td>${statusLabelHtml(s.status)}</td>
            <td class="row">
              ${editCtrl}
              <a class="btn secondary" href="/statistics.html?id=${encodeURIComponent(s.id)}">统计</a>
              <button type="button" class="btn" data-copy-link="${escapeHtml(fillUrl)}">复制问卷链接</button>
              <button type="button" data-pub="${s.id}">发布</button>
              <button type="button" data-close="${s.id}" class="secondary">关闭问卷</button>
              <button type="button" data-del="${s.id}" class="danger">删除问卷</button>
            </td>
          </tr>`;
        }
        html += "</tbody></table>";
        box.innerHTML = html;
        box.querySelectorAll("[data-pub]").forEach((btn) => {
          btn.onclick = () => publish(btn.getAttribute("data-pub"));
        });
        box.querySelectorAll("[data-close]").forEach((btn) => {
          btn.onclick = () => closeSurvey(btn.getAttribute("data-close"));
        });
        box.querySelectorAll("[data-copy-link]").forEach((btn) => {
          btn.onclick = () => copySurveyLink(btn.getAttribute("data-copy-link"));
        });
        box.querySelectorAll("[data-del]").forEach((btn) => {
          btn.onclick = () => deleteSurvey(btn.getAttribute("data-del"));
        });
      } catch (e) {
        box.innerHTML = "";
        document.getElementById("msg").textContent = e.message;
      }
    }
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
    function statusLabelHtml(st) {
      const map = {
        draft: ["未发布", "survey-status-draft"],
        published: ["已发布", "survey-status-published"],
        closed: ["已关闭", "survey-status-closed"],
      };
      const pair = map[st] || [st, "survey-status-unknown"];
      return `<span class="survey-status ${pair[1]}">${escapeHtml(pair[0])}</span>`;
    }
    async function publish(id) {
      try {
        await apiJson("/surveys/" + id + "/publish", { method: "POST" });
        await load();
      } catch (e) {
        alert(e.message);
      }
    }
    async function closeSurvey(id) {
      try {
        await apiJson("/surveys/" + id + "/close", { method: "POST" });
        await load();
      } catch (e) {
        alert(e.message);
      }
    }
    async function copySurveyLink(url) {
      if (!url) return;
      try {
        await navigator.clipboard.writeText(url);
        const el = document.getElementById("msg");
        el.className = "ok";
        el.textContent = "已复制";
        clearTimeout(copySurveyLink._t);
        copySurveyLink._t = setTimeout(() => {
          el.textContent = "";
          el.className = "err";
        }, 2200);
      } catch (e) {
        alert("复制失败，请手动复制：\n" + url);
      }
    }
    const gateModal = document.getElementById("surveyEditGateModal");
    const gateMessage = document.getElementById("surveyGateMessage");

    function openSurveyGate(surveyId) {
      gateModal.dataset.surveyId = surveyId;
      gateModal.classList.add("open");
      gateModal.setAttribute("aria-hidden", "false");
      gateMessage.textContent =
        "已发布或已关闭，无法在此编辑。请「复制」生成草稿，或「预览」只读。";
    }

    function closeSurveyGate() {
      gateModal.classList.remove("open");
      gateModal.setAttribute("aria-hidden", "true");
      delete gateModal.dataset.surveyId;
    }

    document.getElementById("list").addEventListener("click", (e) => {
      const btn = e.target.closest("[data-gate-edit]");
      if (!btn) return;
      e.preventDefault();
      openSurveyGate(btn.getAttribute("data-gate-edit"));
    });

    document.getElementById("surveyGateDismiss").onclick = () =>
      closeSurveyGate();

    gateModal.addEventListener("click", (e) => {
      if (e.target === gateModal) closeSurveyGate();
    });

    document.getElementById("surveyGatePreview").onclick = () => {
      const id = gateModal.dataset.surveyId;
      if (!id) return;
      closeSurveyGate();
      window.location.href =
        "/edit.html?id=" + encodeURIComponent(id) + "&preview=1";
    };

    document.getElementById("surveyGateDuplicate").onclick = async () => {
      const id = gateModal.dataset.surveyId;
      if (!id) return;
      try {
        await apiJson("/surveys/" + encodeURIComponent(id) + "/duplicate", {
          method: "POST",
        });
        const el = document.getElementById("msg");
        el.className = "ok";
        el.textContent = "已生成副本，请在列表中打开标题含「-副本」的草稿。";
        closeSurveyGate();
        await load();
      } catch (err) {
        alert(err.message);
      }
    };

    async function deleteSurvey(id) {
      if (
        !confirm(
          "确定删除该问卷？题目、跳转规则与所有答卷将永久删除，不可恢复。"
        )
      )
        return;
      try {
        await apiJson("/surveys/" + encodeURIComponent(id), {
          method: "DELETE",
        });
        const el = document.getElementById("msg");
        el.className = "ok";
        el.textContent = "已删除";
        await load();
      } catch (e) {
        alert(e.message);
      }
    }
    document.getElementById("create").onclick = async () => {
      try {
        const res = await apiJson("/surveys", {
          method: "POST",
          body: JSON.stringify({ title: "未命名问卷", description: "" }),
        });
        window.location.href = "/edit.html?id=" + encodeURIComponent(res.data.id);
      } catch (e) {
        alert(e.message);
      }
    };
    load();
  </script>
</body>
</html>
